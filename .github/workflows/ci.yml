name: CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint:check
      - run: npm run typecheck

      # build WITHOUT secrets (important)
      - run: npm run build
        env:
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:
            ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }} \
            --build-arg NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }} \
            -t advocate-app:latest .

      - name: Save image
        run: docker save advocate-app:latest -o image.tar

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'image.tar'
          target: '/tmp'

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker load -i /tmp/image.tar

            docker stop advocate || true
            docker rm advocate || true

            docker run -d \
              --name advocate \
              -p 3000:3000 \
              --env-file /root/app/.env.production \
              advocate-app:latest
