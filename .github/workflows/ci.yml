name: CI/CD

on:
  push:
    branches: [main, dev]

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint:check
      - run: npm run typecheck
      - run: npm run test

      # build WITHOUT secrets (important)
      - run: npm run build
        env:
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME:
            ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}
          SKIP_DB_ON_BUILD: true

  deploy:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: ci
    # Deploy only from main; dev just gets CI checks above.
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }} \
            --build-arg NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }} \
            -t advocate-app:latest .

      # No server access yet — everything below is disabled until SSH access
      # to the target host is available. Uncomment to re-enable upload/deploy.

      # - name: Save image
